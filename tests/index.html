<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>

<div class="box">
    <div class="form">
        <h2>Login</h2>

        <div class="inputBox">
            <input data-testid="username" type="text" required>
            <span>Username</span>
        </div>

        <div class="inputBox">
            <input data-testid="password" type="password" required>
            <span>Password</span>
        </div>

        <input data-testid="login" type="submit" value="Login">
    </div>
</div>

</body>
</html>
